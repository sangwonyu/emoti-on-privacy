<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 외부 글로우 -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE4D6" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#F7BAAC" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F7BAAC" stop-opacity="0"/>
    </radialGradient>
    <!-- 구체 그라데이션 -->
    <radialGradient id="orb" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFF5EC"/>
      <stop offset="40%" stop-color="#FFCFB8"/>
      <stop offset="80%" stop-color="#F7BAAC"/>
      <stop offset="100%" stop-color="#E8A99A"/>
    </radialGradient>
    <!-- 내부 빛 -->
    <radialGradient id="coreLight" cx="45%" cy="38%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 글로우 -->
  <circle cx="32" cy="32" r="28" fill="url(#outerGlow)"/>
  <!-- 온기 방사선 (부드러운 빛살) -->
  <g opacity="0.3" stroke="#F7BAAC" stroke-width="1.5" stroke-linecap="round">
    <line x1="32" y1="6" x2="32" y2="12"/>
    <line x1="32" y1="52" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="12" y2="32"/>
    <line x1="52" y1="32" x2="58" y2="32"/>
    <line x1="13" y1="13" x2="17" y2="17"/>
    <line x1="47" y1="47" x2="51" y2="51"/>
    <line x1="51" y1="13" x2="47" y2="17"/>
    <line x1="17" y1="47" x2="13" y2="51"/>
  </g>
  <!-- 메인 구체 -->
  <circle cx="32" cy="32" r="16" fill="url(#orb)"/>
  <!-- 코어 빛 -->
  <circle cx="30" cy="30" r="8" fill="url(#coreLight)"/>
  <!-- 하이라이트 -->
  <ellipse cx="27" cy="27" rx="3.5" ry="2.5" fill="white" opacity="0.7" transform="rotate(-25, 27, 27)"/>
</svg>
